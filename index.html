  <body>
    <header>
      <div class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container d-flex justify-content-between">
          <a href="#" class="navbar-brand d-flex align-items-center">

    </header>

    <main role="main">
      <section class="jumbotron text-center">
        <div class="container">
          <h1 class="jumbotron-heading">About Me</h1>
          <p class="lead text-muted">
            於2019年2月份第一次開始接觸前端工作領域，目前會的程式有 jQuery 、
            vue.js 、 Node.js 、 Sass 等。<br />
            於2019年7月參加六角學院舉辦的 The F2E
            闖關活動，並於2019年10月1日獲得通關證書(完成共計9道關卡)。<br />

          </p>

      <div id="app" class="container">
        <div class="row">
          <div class="col-12">
            <button
              class="btn btn-link float-right text-dark mb-2"
              @click="isReverse = !isReverse"
            >
              排序：最後更新
              <span
                class="d-inline-block ml-2"
                :class="{'inverse': isReverse }"
              >
                <i class="fas fa-angle-down"></i>
              </span>
            </button>
          </div>
          <div v-for="item in sort" class="col-12 col-md-6">
            <div class="card mb-4 shadow-sm">
              <img
                class="card-img-top"
                style="height: auto"
                :src="item.img"
                alt=""
              />
              <div class="card-body border">
                <p class="card-text">{{item.name}}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <div class="btn-group">
                    <a
                      :href="item.view"
                      class="btn btn-sm btn-outline-secondary"
                      >作品網址</a
                    >
                    <a
                      :href="item.source"
                      class="btn btn-sm btn-outline-secondary"
                      >原始碼</a
                    >
                  </div>
                  <small class="text-muted">最後更新 {{item.lastUpdate}}</small>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark py-5 text-white">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            © 2021 All rights reserved. And Design by
            <a href="https://github.com/WangShuan">WangShuan</a>
          </div>
          <a class="btn btn-light" href="#"><i class="fas fa-angle-up"></i></a>
        </div>
      </div>
    </footer>

    <script>
      var app = new Vue({
        el: "#app",
        data: {
          data: [
            {
              name: "vue - 拼圖迷電商網站",
              view: "https://wangshuan.github.io/dist/#/",
              source: "https://github.com/WangShuan/vue-portfolio-v3",
              img: "https://i.ibb.co/jMFm3Ff/2021-04-01-4-56-36.png",
              lastUpdate: "2020.12.21",
            },
            {
              name: "vue - 甜點電商設計稿",
              view: "https://wangshuan.github.io/vue+scss-sweetaste/#/",
              source: "https://github.com/WangShuan/vue-sweetaste",
              img: "https://i.ibb.co/4Nq5Qnz/2021-04-01-5-37-40.png",
              lastUpdate: "2021.03.24",
            },
            {
              name: "jQuery - The F2E 90秒小遊戲",
              view: "https://wangshuan.github.io/jquery-90s-game",

              img: "https://i.ibb.co/k1zPfSz/2021-04-01-5-43-45.png",

              source: "https://github.com/WangShuan/F2E-booking",
              img: "https://i.ibb.co/Gv5ZRqF/2021-04-01-5-38-59.png",
              lastUpdate: "2021.03.31",
            },
            {
              name: "vue - The F2E 口罩地圖",

              img: "https://i.ibb.co/njc9GtZ/2021-04-01-5-31-05.png",

            {

            {

            {

              img: "https://i.ibb.co/H707KX3/8855505-63ab9ffa9fa692ff563dcd387e017584.png",
              lastUpdate: "2021.05.31",
            },
          ],
          isReverse: false,
        },
        computed: {
          sort: function () {
            var vm = this;
            var sortData = vm.data.sort(function (a, b) {
              var a = new Date(a["lastUpdate"]).getTime();
              var b = new Date(b["lastUpdate"]).getTime();
              if (vm.isReverse) {
                return a - b;
              } else {
                return b - a;
              }
            });
            return sortData;
          },
        },
      });
    </script>
