<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WangShuan 的 gh-page 首頁</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    header {
      z-index: 9999;
      position: absolute;
      top: 0;
      width: 100%;
      border-bottom: 1px solid #ccc;
    }

    .container {
      width: 100vw;
      margin: 0 auto;
      min-height: 100%;
      padding-bottom: 100px;
      padding-top: 60px;
    }

    .project-list {
      list-style: square;
      margin: 20px;
      padding-left: 30px;
    }

    .project-list-item {
      padding: 10px;
    }

    .project-list-item:hover {
      text-shadow: 1px 1px #ccc;
    }

    .project-list-link {
      color: darkslategray;
      font-size: 18px;
      text-decoration: none;
    }

    .footer {
      height: 100px;
      margin: 0 auto;
      width: 100vw;
      border-top: 1px solid #ccc;
      text-align: center;
      line-height: 100px;
      position: relative;
      top: -100px;
      background-color: #fff;
    }

    .navbar {
      width: 100vw;
      margin: 0 auto;
      height: 60px;
      background-color: #fff;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
    }

    .navbar-brand {
      height: 60px;
      width: 150px;
      line-height: 30px;
      margin-left: 10px;
      text-align: center;
      color: black;
      text-decoration: none;
    }

    .navbar-brand b {
      font-size: 24px;
      color: darkslategray;
      font-weight: bolder;
    }

    .navbar-list {
      flex-basis: 50%;
    }

    .navbar-nav {
      list-style: none;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
    }

    .navbar-nav li {
      flex: 1;
      line-height: 60px;
      font-size: 18px;
      text-align: center;
    }

    @media (max-width: 568px) {
      .navbar-nav li {
        font-size: 14px;
      }
    }

    .navbar-nav li a {
      color: darkolivegreen;
      border-left: 6px solid darkolivegreen;
      text-decoration: none;
      padding: 10px;
    }

    @media (max-width: 568px) {
      .navbar-nav li a {
        padding: 5px;
      }
    }

    .navbar-nav li a:hover {
      border-color: darkslategrey;
      color: darkslategrey;
      font-weight: 700;
    }

  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <a class="navbar-brand" href="#"><b>WangShuan</b><br>GitHub Page</a>
      <div class="navbar-list">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="#">HOME</a>
          </li>
          <li class="nav-item">
            <a href="#">ABOUT</a>
          </li>
          <li class="nav-item">
            <a href="#">CONTACT</a>
          </li>
        </ul>
      </div>
      </div>
    </nav>
  </header>
  <div class="container">
    <ul class="project-list">
      <li class="project-list-item">
        <a class="project-list-link" href="https://wangshuan.github.io/dist/#/">
          vue 出一個電商網站 - 拼圖迷</a>
      </li>
      <li class="project-list-item">
        <a class="project-list-link" href="https://wangshuan.github.io/vue-mask-map/#/">
          vue - 口罩地圖</a>
      </li>
    </ul>
  </div>
  <footer class="footer">
    © 2010 All rights reserved. And Design by <a href="https://github.com/WangShuan">WangShuan</a>
  </footer>
</body>

</html>
